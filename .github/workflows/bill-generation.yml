name: Bill Generation Scheduler

on:
  schedule:
    - cron: '30 15 * * *' # Every day at 3:30 PM UTC (9:00 PM IST)
  workflow_dispatch: # Allow manual trigger

jobs:
  check-generation:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Bill Generation Check
        run: |
          curl -X GET "${{ secrets.API_URL }}/api/notifications/check?secret=${{ secrets.INTERNAL_SECRET }}&type=GENERATION"
